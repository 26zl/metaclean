name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    name: Build gem
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true

      - name: Build gem
        run: bundle exec rake build

      - name: Upload gem as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: metaclean-gem
          path: pkg/*.gem

      - name: Attach gem to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: pkg/*.gem
          generate_release_notes: true

      - name: Publish to RubyGems via Trusted Publisher
        if: startsWith(github.ref, 'refs/tags/')
        uses: rubygems/release-gem@v1
